<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADPC — Settings</title>
  <script src="../scripts/theme.js"></script>
  <script src="../scripts/qrcode.min.js" defer></script>
  <script src="settings.js" defer></script>
  <link rel="stylesheet" href="settings.css">
</head>
<body>

  <header class="settings-header">
    <div class="header-inner">
      <img src="../assets/adpc_logo_high.png" alt="ADPC" class="header-logo">
      <span class="header-label">Settings</span>
    </div>
  </header>

  <div class="settings-content" id="settings-content">
    <table class="settings-table" id="settings-table">

      <!-- Child Mode -->
      <tr>
        <td class="settings-label">Child Mode</td>
        <td class="settings-control">
          <button id="child-mode-button" class="btn btn-primary"></button>
        </td>
      </tr>

      <!-- Pair App -->
      <tr class="pair-app-row">
        <td class="settings-label">
          <span id="pair-status"></span>
        </td>
        <td class="settings-control">
          <button id="pair-app" class="btn btn-primary" style="display:none;"></button>
          <button id="unpair-app" class="btn btn-ghost" style="display:none;"></button>
        </td>
      </tr>

      <!-- WebSocket URL -->
      <tr>
        <td class="settings-label">Signaling Server</td>
        <td class="settings-control">
          <div id="websocket-display" style="display:none;">
            <button id="edit-websocket-url" class="btn btn-ghost">Edit</button>
          </div>
          <div id="websocket-edit" class="url-input-row">
            <input type="text" id="websocket-url" placeholder="ws://example.com:8080">
            <button id="save-websocket-url" class="btn btn-primary">Save</button>
          </div>
        </td>
      </tr>

      <!-- Clear Data -->
      <tr>
        <td class="settings-label">Local Data</td>
        <td class="settings-control">
          <button id="clear-all" class="btn btn-danger">Clear</button>
        </td>
      </tr>

      <!-- Theme -->
      <tr>
        <td class="settings-label">Theme</td>
        <td class="settings-control">
          <div class="theme-toggle" id="theme-toggle">
            <button class="theme-btn" data-theme-val="light">Light</button>
            <button class="theme-btn active" data-theme-val="system">System</button>
            <button class="theme-btn" data-theme-val="dark">Dark</button>
          </div>
        </td>
      </tr>

    </table>

    <!-- QR Code -->
    <div id="qr-code-container">
      <p class="qr-label">Scan this QR code with your mobile app to pair:</p>
      <div id="qr-code">
        <img id="qr-code-logo" src="../assets/adpc_logo_high.png" alt="ADPC Logo">
      </div>
    </div>

    <!-- PIN Modal -->
    <div id="pin-modal" class="modal">
      <div class="modal-content">
        <h2 class="modal-title">Authentication Required</h2>
        <p id="auth-message" class="modal-body">Please authenticate to continue</p>

        <div id="windows-hello-section">
          <button id="windows-hello-button" class="btn btn-primary btn-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
              <path d="M5 19.5C5.5 18 6 15 6 12c0-.7.12-1.37.34-2"/>
              <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/>
              <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/>
              <path d="M8.65 22c.21-.66.45-1.32.57-2"/>
              <path d="M14 13.12c0 2.38 0 6.38-1 8.88"/>
              <path d="M2 16h.01"/>
              <path d="M21.8 16c.2-2 .131-5.354 0-6"/>
              <path d="M9 6.8a6 6 0 0 1 9 5.2c0 .47 0 1.17-.02 2"/>
            </svg>
            Use Windows Hello
          </button>
          <p class="modal-fallback">Or use PIN as fallback:</p>
        </div>

        <input type="password" id="pin-input" class="pin-input" placeholder="Enter PIN">
        <div class="modal-buttons">
          <button id="cancel-pin" class="btn btn-ghost">Cancel</button>
          <button id="confirm-pin" class="btn btn-primary">Confirm</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
